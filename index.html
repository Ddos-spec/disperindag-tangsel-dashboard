<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/tangsel-logo.png">
  <meta name="theme-color" content="#0898b8">
  <title>Disperindag Tangsel Dashboard</title>
  <meta http-equiv="refresh" content="0; url=/api/dashboard">
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: linear-gradient(135deg, #f4fdff, #fff, #eefbf2); color: #123047; }
    .card { width: min(420px, calc(100vw - 32px)); padding: 28px; border: 1px solid rgba(8,152,184,.2); border-radius: 28px; background: rgba(255,255,255,.9); box-shadow: 0 24px 80px rgba(8,152,184,.14); text-align: center; }
    .card::before { content:""; display:block; width:76px; height:76px; margin:0 auto 16px; border-radius:22px; background:#fff url('/assets/tangsel-logo.png') center/84% no-repeat; border:1px solid rgba(8,152,184,.22); }
    a { color: #0898b8; font-weight: 800; text-decoration: none; }
  </style>
  <script>window.location.replace('/api/dashboard');</script>
</head>
<body>
  <main class="card">
    <strong>Mengarahkan ke dashboard aman...</strong>
    <p>Jika tidak otomatis, <a href="/api/dashboard">buka dashboard</a>.</p>
  </main>
</body>
</html>
