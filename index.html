<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Disperindag Tangsel Dashboard</title>
  <meta http-equiv="refresh" content="0; url=/api/dashboard">
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #f8f5ff; color: #120f3a; }
    .card { width: min(420px, calc(100vw - 32px)); padding: 28px; border: 1px solid #ebe4ff; border-radius: 28px; background: rgba(255,255,255,.86); box-shadow: 0 24px 80px rgba(74, 31, 180, .12); text-align: center; }
    a { color: #6d28d9; font-weight: 800; text-decoration: none; }
  </style>
  <script>window.location.replace('/api/dashboard');</script>
</head>
<body>
  <main class="card">
    <strong>Mengarahkan ke dashboard aman...</strong>
    <p>Jika tidak otomatis, <a href="/api/dashboard">buka dashboard</a>.</p>
  </main>
</body>
</html>
