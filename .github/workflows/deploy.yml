name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate GitHub Pages redirect
        shell: bash
        run: |
          mkdir -p pages-redirect
          cat > pages-redirect/index.html <<'EOF'
          <!doctype html>
          <html lang="id">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=https://exec-dashboard-ashen.vercel.app/">
            <title>Redirecting...</title>
            <script>location.replace('https://exec-dashboard-ashen.vercel.app/');</script>
          </head>
          <body>
            <a href="https://exec-dashboard-ashen.vercel.app/">Buka dashboard production</a>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'pages-redirect'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
