<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Dashboard Strategis Disperindag Tangsel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:#111827;background:radial-gradient(circle at 18% 18%,rgba(124,58,237,.20),transparent 30%),radial-gradient(circle at 82% 8%,rgba(16,185,129,.16),transparent 28%),linear-gradient(135deg,#F7F3FF 0%,#FFFFFF 48%,#EEF2FF 100%);display:grid;place-items:center;padding:22px}.card{width:min(460px,100%);padding:30px;border:1px solid rgba(124,58,237,.18);border-radius:28px;background:rgba(255,255,255,.90);box-shadow:0 24px 70px rgba(49,46,129,.18);backdrop-filter:blur(18px)}.badge{display:inline-flex;margin-bottom:16px;padding:7px 12px;border-radius:999px;background:#EDE9FE;color:#6D28D9;font-size:12px;font-weight:900;letter-spacing:.04em;text-transform:uppercase}h1{margin:0 0 10px;font-size:clamp(30px,9vw,42px);line-height:1.05;letter-spacing:-.05em}p{margin:0 0 22px;color:#4B5563;line-height:1.55}.form{display:grid;gap:10px}label{color:#374151;font-size:12px;font-weight:900;letter-spacing:.05em;text-transform:uppercase}input{width:100%;min-height:50px;padding:0 14px;border:1px solid #DDD6FE;border-radius:14px;color:#111827;background:#fff;font:inherit;outline:none}input:focus{border-color:#7C3AED;box-shadow:0 0 0 4px rgba(124,58,237,.12)}button{min-height:50px;margin-top:6px;border:0;border-radius:14px;background:#4F46E5;color:#fff;font-weight:900;cursor:pointer;box-shadow:0 14px 30px rgba(124,58,237,.24)}button:disabled{opacity:.65;cursor:wait}.error{min-height:20px;color:#DC2626;font-size:13px;font-weight:800}@media(max-width:420px){.card{padding:26px;border-radius:26px}}
  </style>
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/tangsel-logo.png">
<meta name="theme-color" content="#0898b8">
<style id="tangsel-login-polish">
:root {
  --tangsel-cyan: #0898b8;
  --tangsel-gold: #f5bd26;
  --tangsel-green: #12834b;
  --tangsel-red: #c9252d;
  --tangsel-brown: #7b4a2b;
  --tangsel-ink: #123047;
}
body {
  background:
    radial-gradient(circle at 12% 8%, rgba(245, 189, 38, .22), transparent 30%),
    radial-gradient(circle at 82% 12%, rgba(8, 152, 184, .26), transparent 34%),
    linear-gradient(135deg, #f4fdff 0%, #ffffff 46%, #eefbf2 100%) !important;
  color: var(--tangsel-ink) !important;
}
.card {
  border: 1px solid rgba(8, 152, 184, .2) !important;
  box-shadow: 0 28px 90px rgba(8, 152, 184, .18) !important;
}
.card::before {
  content: "";
  display: block;
  width: 86px;
  height: 86px;
  margin: 0 auto 16px;
  border-radius: 24px;
  background: #fff url('/assets/tangsel-logo.png') center / 84% no-repeat;
  border: 1px solid rgba(8, 152, 184, .24);
  box-shadow: 0 16px 38px rgba(8, 152, 184, .16);
}
.badge {
  background: rgba(8, 152, 184, .1) !important;
  color: var(--tangsel-cyan) !important;
  border-color: rgba(8, 152, 184, .22) !important;
}
h1 {
  color: #092f46 !important;
}
button, #login-button {
  background: var(--tangsel-cyan) !important;
  box-shadow: 0 16px 38px rgba(8, 152, 184, .24) !important;
}
input:focus {
  border-color: var(--tangsel-cyan) !important;
  box-shadow: 0 0 0 4px rgba(8, 152, 184, .12) !important;
}
</style>
<style id="tangsel-login-complete-redesign">
body {
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(255,255,255,.94) 0 34%, rgba(47,159,211,.86) 34% 100%),
    radial-gradient(circle at 78% 24%, rgba(245, 189, 38, .22), transparent 26%);
  z-index: -2;
}
body::after {
  content: "DASHBOARD STRATEGIS DISPERINDAG KOTA TANGERANG SELATAN";
  position: fixed;
  top: 36px;
  left: min(54vw, 760px);
  right: 32px;
  color: #fff;
  font-size: clamp(22px, 3vw, 36px);
  font-weight: 950;
  line-height: 1.08;
  letter-spacing: -.04em;
  text-shadow: 0 8px 24px rgba(9, 47, 70, .18);
  z-index: -1;
}
main.card {
  position: relative;
  width: min(460px, calc(100vw - 32px)) !important;
  margin-right: min(42vw, 520px);
  padding: 34px !important;
  border-radius: 26px !important;
  background: rgba(255, 255, 255, .96) !important;
  backdrop-filter: blur(18px);
}
main.card::after {
  content: "Pemerintah Kota Tangerang Selatan";
  display: block;
  margin: 18px auto 0;
  padding: 10px 12px;
  border-radius: 999px;
  background: rgba(8, 152, 184, .08);
  color: #087da5;
  font-size: 12px;
  font-weight: 950;
  text-transform: uppercase;
  letter-spacing: .08em;
}
.badge {
  width: fit-content;
  margin: 0 auto 12px !important;
  padding: 8px 12px !important;
  border-radius: 999px !important;
  font-weight: 950 !important;
  letter-spacing: .06em !important;
  text-transform: uppercase !important;
}
.form {
  display: grid !important;
  gap: 12px !important;
  margin-top: 22px !important;
}
label {
  color: #123047 !important;
  font-size: 12px !important;
  font-weight: 950 !important;
  letter-spacing: .08em !important;
  text-transform: uppercase !important;
}
#login-code {
  min-height: 52px !important;
  padding: 0 16px !important;
  border-radius: 16px !important;
  background: #fbfeff !important;
}
#login-button {
  min-height: 52px !important;
  border-radius: 16px !important;
  font-weight: 950 !important;
  cursor: pointer;
}
#login-button:hover {
  transform: translateY(-1px);
  filter: saturate(1.08);
}
.error {
  color: var(--tangsel-red) !important;
  font-weight: 800 !important;
}
@media (max-width: 760px) {
  body::before {
    background:
      linear-gradient(180deg, rgba(47,159,211,.92) 0 220px, #f4fdff 220px 100%),
      radial-gradient(circle at 72% 8%, rgba(245, 189, 38, .22), transparent 30%);
  }
  body::after {
    position: static;
    display: block;
    margin: 28px 20px 18px;
    font-size: 24px;
    text-align: center;
  }
  main.card {
    margin: 0 auto 24px !important;
    padding: 28px !important;
  }
}
</style>
</head>
<body>
  <main class="card">
    <div class="badge">Disperindag Tangsel</div>
    <h1>Login Dashboard Strategis</h1>
    <p>Masukkan access code operator untuk membuka dashboard. Autentikasi dan AI berjalan lewat backend server-side.</p>
    <form id="login-form" class="form">
      <label for="login-code">Access Code</label>
      <input id="login-code" name="accessCode" type="password" autocomplete="current-password" placeholder="Masukkan access code" required autofocus />
      <button id="login-button" type="submit">Masuk Dashboard</button>
      <div class="error" id="login-error" role="alert"></div>
    </form>
  </main>
  <script>
    const form = document.getElementById('login-form');
    const input = document.getElementById('login-code');
    const button = document.getElementById('login-button');
    const errorBox = document.getElementById('login-error');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.textContent = '';
      button.disabled = true;
      button.textContent = 'Memeriksa...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accessCode: input.value.trim() })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.error || 'Login gagal.');
        const next = new URLSearchParams(location.search).get('next') || '/';
        location.href = next.startsWith('/') ? next : '/';
      } catch (error) {
        errorBox.textContent = error.message || 'Login gagal.';
        input.select();
      } finally {
        button.disabled = false;
        button.textContent = 'Masuk Dashboard';
      }
    });
  </script>
</body>
</html>
